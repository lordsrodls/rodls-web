# =====================================================================
# Nginx - Configuration pour site statique Astro
# Fichier : /opt/docker/rodls-site/nginx.conf
# =====================================================================
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;
    server_tokens off;

    # ---------- Compression gzip ----------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/x-font-ttf
        font/opentype
        image/svg+xml;

    # ---------- Cache long pour assets immuables Astro ----------
    location ^~ /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ---------- Cache moyen pour images et fonts ----------
    location ~* \.(jpg|jpeg|png|gif|webp|avif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # ---------- Routage principal Astro ----------
    # Essaie : fichier exact, fichier.html, dossier/index.html, sinon 404
    location / {
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }

    # ---------- Page 404 personnalisee ----------
    error_page 404 /404.html;
    location = /404.html {
        internal;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ---------- Bloquer les fichiers caches ----------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /favicon.svg {
        log_not_found off;
        access_log off;
    }
}
