# =====================================================================
# Site Astro rodls.me - Docker Compose (avec auth Google via oauth2-proxy)
# Fichier : /opt/docker/rodls-site/docker-compose.yml
# =====================================================================
services:
  rodls:
    image: nginx:alpine
    container_name: rodls
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - web
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - TZ=Europe/Paris
    labels:
      - "traefik.enable=true"

      # ----- Router HTTPS -----
      - "traefik.http.routers.rodls.rule=Host(`rodls.me`) || Host(`www.rodls.me`)"
      - "traefik.http.routers.rodls.entrypoints=websecure"
      - "traefik.http.routers.rodls.tls=true"
      - "traefik.http.routers.rodls.tls.certresolver=letsencrypt"

      # ----- Middlewares (ordre important !) -----
      # 1. oauth-signin  : transforme un 401 en redirection vers /oauth2/sign_in
      # 2. oauth-google  : vérifie l'auth, renvoie 401 si KO
      # 3. les autres    : sécurité, compression, redirection www
      - "traefik.http.routers.rodls.middlewares=oauth-signin@docker,oauth-google@docker,secure-headers-public@file,compress@file,redirect-www-to-apex@file"

      # ----- Service interne -----
      - "traefik.http.services.rodls.loadbalancer.server.port=8080"

      # ----- Middleware : redirection www -> apex -----
      - "traefik.http.middlewares.redirect-www-to-apex.redirectregex.regex=^https?://www\\.(.+)"
      - "traefik.http.middlewares.redirect-www-to-apex.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.redirect-www-to-apex.redirectregex.permanent=true"

networks:
  web:
    external: true
